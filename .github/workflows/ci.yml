# =============================================================================
# .github/workflows/ci.yml
# Runs on every push to any branch and every pull request to main.
#
# Jobs:
#   lint     — ruff check + format check
#   typecheck — mypy
#   test     — pytest with coverage
#   docker-build — smoke test image build (no push)
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: pulse-webqa-agent

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff==0.4.4
      - run: ruff format --check .
      - run: ruff check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: mypy api/ rag/ ingestion/ crawler/ monitoring/ config/ db/ --ignore-missing-imports

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      GOOGLE_API_KEY: "ci-placeholder"
      MONGODB_URI: "mongodb://localhost:27017"
      MYSQL_PASSWORD: "ci-placeholder"
      LANGSMITH_API_KEY: ""
      ENVIRONMENT: "development"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -m "not integration" \
            -x
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max